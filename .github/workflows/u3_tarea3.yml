

name: u3_tarea3

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Hugo Extended
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v0.121.2/hugo_extended_0.121.2_Linux-64bit.tar.gz
          tar -xzf hugo_extended_0.121.2_Linux-64bit.tar.gz
          sudo mv hugo /usr/local/bin/

      - name: Install zip
        run: sudo apt-get install zip -y

      - name: Build site
        run: hugo -d dist

      - name: Package
        run: zip -r awesome-website.zip dist

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: awesome-website.zip
          body_path: DEPLOY.md
